services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: khatwa
      POSTGRES_PASSWORD: khatwa_pass
      POSTGRES_DB: khatwa_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khatwa"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: khatwa
      DATABASE_PASSWORD: khatwa_pass
      DATABASE_NAME: khatwa_db
      JWT_SECRET: ${JWT_SECRET:-replace_in_production}
      JWT_EXPIRES_IN: 15m
      BACKEND_PORT: 3001
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_API_PORT: 3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
